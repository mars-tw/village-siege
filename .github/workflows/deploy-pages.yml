name: Deploy playable client to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check client
        run: npm run typecheck --workspace @village-siege/client

      - name: Run shared simulation tests
        run: npm run test --workspace @village-siege/shared -- --testTimeout=120000

      - name: Build shared package and client for repository Pages path
        env:
          # Safe default is disabled. TASK-026 may enable this without changing
          # source after the public HTTPS/WSS origin passes its live gate.
          VITE_MULTIPLAYER_ENABLED: ${{ vars.VILLAGE_SIEGE_MULTIPLAYER_ENABLED || 'false' }}
          VITE_COLYSEUS_URL: ${{ vars.VILLAGE_SIEGE_COLYSEUS_URL || '' }}
        run: |
          node --input-type=module -e '
            import { validatePagesBuildConfig } from "./deploy/runtime-config.mjs";
            validatePagesBuildConfig(process.env.VITE_MULTIPLAYER_ENABLED, process.env.VITE_COLYSEUS_URL);
          '
          npm run build --workspace @village-siege/shared
          npm run build --workspace @village-siege/client -- --base=/village-siege/

      - name: Prune and validate the Pages runtime art bundle
        run: |
          npm run prune:runtime-art
          npm run validate:runtime-assets

      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6

      - name: Upload playable site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: apps/client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
