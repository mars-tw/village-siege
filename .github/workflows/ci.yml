name: Verify source and supply chain

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Type-check, test and build every workspace
        run: npm run verify

      - name: Audit production dependencies
        run: npm run audit:prod

      - name: Generate CycloneDX SBOM
        run: npm run --silent sbom > village-siege.cdx.json

      - name: Validate CycloneDX document
        run: node -e "const fs=require('node:fs');const sbom=JSON.parse(fs.readFileSync('village-siege.cdx.json','utf8'));if(sbom.bomFormat!=='CycloneDX'||!Array.isArray(sbom.components))throw new Error('Invalid CycloneDX SBOM')"

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: village-siege-cyclonedx
          path: village-siege.cdx.json
          if-no-files-found: error
          retention-days: 30

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Validate local Compose contract
        run: docker compose --env-file .env.example config --quiet

      - name: Build non-root client and server images
        run: docker compose --env-file .env.example build client server

      - name: Start the durable local stack
        run: docker compose --env-file .env.example up --detach --wait

      - name: Verify health, version and runtime users
        shell: bash
        run: |
          curl --fail --silent --show-error http://127.0.0.1:8080/_health
          curl --fail --silent --show-error http://127.0.0.1:2567/health/ready
          curl --fail --silent --show-error http://127.0.0.1:2567/version | node -e "let s='';process.stdin.on('data',c=>s+=c).on('end',()=>{const v=JSON.parse(s);if(v.version!=='0.18.0'||v.protocolVersion!=='village-siege-network/4')process.exit(1)})"
          test "$(docker compose --env-file .env.example exec -T client id -u)" != "0"
          test "$(docker compose --env-file .env.example exec -T server id -u)" != "0"

      - name: Stop the local stack
        if: always()
        run: docker compose --env-file .env.example down --volumes

  production-template:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GIT_COMMIT_SHA: ${{ github.sha }}
      # Local-only hostnames force Caddy's internal CA during CI; no ACME call.
      PUBLIC_GAME_HOST: localhost
      PUBLIC_SERVER_HOST: 127.0.0.1
      ACME_EMAIL: operator@example.com
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Validate operations assets and shell syntax
        shell: bash
        run: |
          npm run validate:ops
          sh -n deploy/server-entrypoint.sh
          sh -n deploy/backup/backup-postgres.sh
          sh -n deploy/backup/restore-postgres.sh

      - name: Create ephemeral CI-only Docker secrets
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/village-siege-secrets"
          node -e "const c=require('node:crypto'),f=require('node:fs'),p=process.env.RUNNER_TEMP+'/village-siege-secrets/';f.writeFileSync(p+'redis_password',c.randomBytes(48).toString('base64url')+'\n',{mode:0o600});f.writeFileSync(p+'postgres_password',c.randomBytes(48).toString('base64url')+'\n',{mode:0o600})"
          echo "REDIS_PASSWORD_FILE=$RUNNER_TEMP/village-siege-secrets/redis_password" >> "$GITHUB_ENV"
          echo "POSTGRES_PASSWORD_FILE=$RUNNER_TEMP/village-siege-secrets/postgres_password" >> "$GITHUB_ENV"

      - name: Validate the independent production Compose and Caddy config
        shell: bash
        run: |
          docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml config --quiet
          docker run --rm \
            -e ACME_EMAIL=operator@example.com \
            -e PUBLIC_GAME_HOST=play.example.com \
            -e PUBLIC_SERVER_HOST=server.play.example.com \
            -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2.11.4-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          docker run --rm --entrypoint /bin/promtool \
            -v "$PWD/deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            -v "$PWD/deploy/monitoring/alerts:/etc/prometheus/rules:ro" \
            prom/prometheus:v3.13.1 check config /etc/prometheus/prometheus.yml

      - name: Build and start the complete production template
        run: docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml up --build --detach --wait postgres redis server client caddy

      - name: Verify production readiness, metrics and non-root application users
        shell: bash
        run: |
          docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml exec -T server node -e "Promise.all([fetch('http://127.0.0.1:2567/health/ready'),fetch('http://127.0.0.1:2567/metrics')]).then(async r=>{if(r.some(x=>!x.ok))process.exit(1);const m=await r[1].text();const names=['village_siege_match_rooms','village_siege_recovery_fail_stops_total','village_siege_persistence_failures_total','village_siege_tick_duration_seconds_sum','village_siege_tick_duration_seconds_count','village_siege_persistence_duration_seconds_sum','village_siege_persistence_duration_seconds_count'];if(names.some(n=>!m.includes(n)))process.exit(1)})"
          docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml exec -T client node -e "fetch('http://127.0.0.1:8080/_health').then(r=>{if(!r.ok)process.exit(1)})"
          test "$(docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml exec -T server id -u)" != "0"
          test "$(docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml exec -T client id -u)" != "0"

      - name: Verify the live TLS edge boundary and WebSocket upgrade
        shell: bash
        run: |
          curl --fail --insecure --silent --show-error https://localhost/ >/dev/null
          curl --fail --insecure --silent --show-error https://127.0.0.1/health/ready >/dev/null
          test "$(curl --insecure --silent --output /dev/null --write-out '%{http_code}' https://127.0.0.1/metrics)" = "404"
          node -e "const tls=require('node:tls');const timer=setTimeout(()=>process.exit(1),5000);const socket=tls.connect({host:'127.0.0.1',port:443,rejectUnauthorized:false},()=>socket.write('GET / HTTP/1.1\r\nHost: 127.0.0.1\r\nUpgrade: websocket\r\nConnection: Upgrade\r\nSec-WebSocket-Key: dGhlIHNhbXBsZSBub25jZQ==\r\nSec-WebSocket-Version: 13\r\nOrigin: https://localhost\r\n\r\n'));let response='';socket.on('data',chunk=>{response+=chunk;if(response.includes('\r\n\r\n')){clearTimeout(timer);if(!response.startsWith('HTTP/1.1 101'))process.exit(1);socket.destroy();process.exit(0)}});socket.on('error',()=>process.exit(1))"

      - name: Stop the production template stack
        if: always()
        run: docker compose --env-file deploy/production.env.example -f deploy/compose.production.yaml down --volumes
