name: Publish release containers

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

concurrency:
  group: publish-containers-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: client
            dockerfile: apps/client/Dockerfile
            build_args: |-
              VITE_MULTIPLAYER_ENABLED=false
              VITE_BASE_URL=/
          - image: server
            dockerfile: Dockerfile
            build_args: ""
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}-${{ matrix.image }}
    steps:
      - name: Check out release source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive immutable release metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=sha,format=long
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.description=Village Siege ${{ matrix.image }} runtime

      - name: Build and publish multi-architecture image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: ${{ matrix.build_args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Attest the published image digest
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
