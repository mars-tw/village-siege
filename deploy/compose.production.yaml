name: village-siege-production

services:
  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    init: true
    depends_on:
      client:
        condition: service_healthy
        restart: true
      server:
        condition: service_healthy
        restart: true
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?Set the ACME account email}
      PUBLIC_GAME_HOST: ${PUBLIC_GAME_HOST:?Set the public game hostname without a scheme}
      PUBLIC_SERVER_HOST: ${PUBLIC_SERVER_HOST:?Set the public server hostname without a scheme}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - edge
      - application
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --output-document=- http://127.0.0.1:2019/healthz | grep -qx OK
      start_period: 10s
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    image: village-siege-client:${VILLAGE_SIEGE_TAG:-production}
    build:
      context: ..
      dockerfile: apps/client/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24.15.0}
        VITE_MULTIPLAYER_ENABLED: "true"
        VITE_COLYSEUS_URL: https://${PUBLIC_SERVER_HOST:?Set the public server hostname without a scheme}
        VITE_BASE_URL: /
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
        restart: true
    environment:
      PORT: "8080"
      PUBLIC_CONNECT_ORIGIN: https://${PUBLIC_SERVER_HOST:?Set the public server hostname without a scheme}
    expose:
      - "8080"
    networks:
      - application
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 15s

  server:
    image: village-siege-server:${VILLAGE_SIEGE_TAG:-production}
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24.15.0}
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_healthy
        restart: true
      postgres:
        condition: service_healthy
        restart: true
    environment:
      NODE_ENV: production
      PORT: "2567"
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:?Set the deployed Git commit SHA}
      ALLOWED_ORIGINS: https://${PUBLIC_GAME_HOST:?Set the public game hostname without a scheme}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-village_siege}
      POSTGRES_USER: ${POSTGRES_USER:-village_siege}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    expose:
      - "2567"
    secrets:
      - redis_password
      - postgres_password
    networks:
      - application
      - data
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    deploy:
      replicas: 1
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:2567/health/ready').then(r=>{if(!r.ok)throw new Error(String(r.status))}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    user: redis
    command:
      - /bin/sh
      - -ec
      - >-
        REDIS_PASSWORD="$$(cat /run/secrets/redis_password)";
        REDIS_PASSWORD_LENGTH="$${#REDIS_PASSWORD}";
        if [ "$${REDIS_PASSWORD_LENGTH}" -lt 32 ] || [ "$${REDIS_PASSWORD_LENGTH}" -gt 128 ]; then
          echo "Redis password must contain 32 to 128 base64url characters" >&2;
          exit 1;
        fi;
        case "$${REDIS_PASSWORD}" in
          *[!A-Za-z0-9_-]*)
            echo "Redis password must contain only base64url characters" >&2;
            exit 1;;
        esac;
        umask 077;
        {
          printf '%s\n' 'appendonly yes';
          printf '%s\n' 'appendfsync everysec';
          printf '%s\n' 'save 60 1';
          printf 'requirepass %s\n' "$${REDIS_PASSWORD}";
        } > /tmp/redis.conf;
        unset REDIS_PASSWORD REDIS_PASSWORD_LENGTH;
        exec redis-server /tmp/redis.conf
    expose:
      - "6379"
    secrets:
      - redis_password
    volumes:
      - redis-data:/data
    networks:
      - data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$$(cat /run/secrets/redis_password)" redis-cli ping | grep -qx PONG
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-village_siege}
      POSTGRES_USER: ${POSTGRES_USER:-village_siege}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    expose:
      - "5432"
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - data
    shm_size: 128mb
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  edge:
  application:
    internal: true
  data:
    internal: true

volumes:
  caddy-data:
  caddy-config:
  redis-data:
  postgres-data:

secrets:
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?Set an absolute path to the Redis password file}
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?Set an absolute path to the PostgreSQL password file}
