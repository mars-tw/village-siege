name: village-siege

services:
  client:
    image: village-siege-client:${VILLAGE_SIEGE_TAG:-local}
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24.15.0}
        VITE_MULTIPLAYER_ENABLED: ${VITE_MULTIPLAYER_ENABLED:-false}
        VITE_COLYSEUS_URL: ${VITE_COLYSEUS_URL:-}
        VITE_BASE_URL: ${VITE_BASE_URL:-/}
    restart: unless-stopped
    init: true
    depends_on:
      server:
        condition: service_healthy
        restart: true
    environment:
      PORT: "8080"
      PUBLIC_CONNECT_ORIGIN: ${PUBLIC_CONNECT_ORIGIN:-}
    ports:
      - "${CLIENT_BIND_ADDRESS:-127.0.0.1}:${CLIENT_PORT:-8080}:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 15s

  server:
    image: village-siege-server:${VILLAGE_SIEGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-24.15.0}
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_healthy
        restart: true
      postgres:
        condition: service_healthy
        restart: true
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: "2567"
      GIT_COMMIT_SHA: ${GIT_COMMIT_SHA:-unknown}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?Set ALLOWED_ORIGINS to the exact browser origin}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-village_siege}
      POSTGRES_USER: ${POSTGRES_USER:-village_siege}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports:
      - "${SERVER_BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-2567}:2567"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:2567/health/ready').then(r=>{if(!r.ok)throw new Error(String(r.status))}).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    user: redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    command:
      - /bin/sh
      - -ec
      - >-
        exec redis-server
        --appendonly yes
        --appendfsync everysec
        --save 60 1
        --requirepass "$${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    read_only: true
    tmpfs:
      - /tmp:size=16m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$${REDIS_PASSWORD}" redis-cli ping | grep -qx PONG
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-village_siege}
      POSTGRES_USER: ${POSTGRES_USER:-village_siege}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    shm_size: 128mb
    security_opt:
      - no-new-privileges:true
    stop_signal: SIGTERM
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  postgres-data:
